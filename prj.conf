# =============================================================================
#  prj.conf - Configurazione Kconfig del progetto
#  RAK5010-M + BG95-M3 | nRF Connect SDK v3.2.3 | Zephyr 4.2.x
# =============================================================================
#
# REGOLA: i commenti Kconfig vanno su righe separate.
# Non usare commenti inline sulle righe di assegnazione (es. CONFIG_X=y # nota)
# perche' vengono interpretati come parte del valore e causano errori.

# -----------------------------------------------------------------------------
# UART - Comunicazione seriale con il modem BG95-M3
# UART_INTERRUPT_DRIVEN abilita la ricezione asincrona via callback,
# necessaria per non bloccare il thread principale durante l'attesa
# delle risposte AT del modem.
# -----------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# -----------------------------------------------------------------------------
# GPIO - Necessario per LED, PWRKEY BG95, output utente e ingresso IN4
# -----------------------------------------------------------------------------
CONFIG_GPIO=y

# -----------------------------------------------------------------------------
# LOGGING - Sistema di log strutturato di Zephyr
# Livelli: 0=off 1=err 2=wrn 3=inf 4=dbg
# LOG_PRINTK redirige printk() al sistema di log.
# -----------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y
CONFIG_PRINTK=y

# -----------------------------------------------------------------------------
# MEMORIA - Stack e heap
# MAIN_STACK_SIZE: stack del thread main (loop SMS polling).
# HEAP_MEM_POOL_SIZE: heap globale usato da Zephyr internamente.
# SYSTEM_WORKQUEUE_STACK_SIZE: stack del work queue di sistema.
# -----------------------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# -----------------------------------------------------------------------------
# TIMING - Timeout a 64 bit per evitare overflow con k_msleep() lunghi
# -----------------------------------------------------------------------------
CONFIG_TIMEOUT_64BIT=y

# -----------------------------------------------------------------------------
# SETTINGS + NVS - Salvataggio persistente dei parametri in flash
#
# Il Settings subsystem di Zephyr fornisce un'API chiave-valore per
# salvare dati in flash non-volatile. Usa NVS (Non-Volatile Storage)
# come backend, che gestisce wear-leveling e integrità dei dati.
#
# Necessario per salvare T1, T2, T3 della sequenza di avvio in modo
# che sopravvivano ai riavvii del dispositivo.
#
# CONFIG_FLASH_MAP: necessario per la mappatura delle partizioni flash.
# CONFIG_MPU_ALLOW_FLASH_WRITE: permette la scrittura in flash tramite MPU.
# -----------------------------------------------------------------------------
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# -----------------------------------------------------------------------------
# I2C + SENSOR - Necessari per leggere i dati ambientali da SHTCX   
# -----------------------------------------------------------------------------
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SHTCX=y
CONFIG_FPU=y

# -----------------------------------------------------------------------------
# MFD + GPIO_MCP230XX - Necessari per gestire i GPIO esterni del MCP23017
# -----------------------------------------------------------------------------
CONFIG_GPIO_MCP230XX=y

# -----------------------------------------------------------------------------
# ADC - Necessario per leggere il valore del potenziometro collegato a IN4
# -----------------------------------------------------------------------------
CONFIG_ADC=y